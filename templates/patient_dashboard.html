<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Status - E-Parchi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="fas fa-arrow-left me-2"></i> E-Parchi</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h5 class="mb-0"><i class="fas fa-clock me-2"></i> Your Queue Status</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-4" id="status">
                            <!-- Status will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateStatus() {
            fetch('/api/queue_status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('status');
                    if (data.error) {
                        statusDiv.innerHTML = '<div class="col-12"><p class="text-danger text-center">Unable to load queue status.</p></div>';
                        return;
                    }

                    const pausedAlert = data.is_paused
                        ? `<div class="col-12">
                                <div class="alert alert-warning text-center">
                                    <i class="fas fa-pause-circle me-2"></i>
                                    <strong>Queue paused:</strong> ${data.paused_reason || 'Doctor is on a short break.'}
                                </div>
                           </div>`
                        : '';

                    statusDiv.innerHTML = `
                        ${pausedAlert}
                        <div class="col-md-6">
                            <div class="card text-center h-100">
                                <div class="card-body">
                                    <i class="fas fa-ticket-alt fa-3x text-primary mb-3"></i>
                                    <h5>Your Token</h5>
                                    <span class="badge bg-primary fs-1">${data.your_token}</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card text-center h-100">
                                <div class="card-body">
                                    <i class="fas fa-user-md fa-3x text-success mb-3"></i>
                                    <h5>Current Serving</h5>
                                    <span class="badge bg-success fs-2">${data.current_token}</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card text-center h-100">
                                <div class="card-body">
                                    <i class="fas fa-users fa-3x text-warning mb-3"></i>
                                    <h5>Patients Ahead</h5>
                                    <span class="badge bg-warning fs-2">${data.patients_ahead}</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card text-center h-100">
                                <div class="card-body">
                                    <i class="fas fa-clock fa-3x text-info mb-3"></i>
                                    <h5>Est. Wait Time</h5>
                                    <span class="badge bg-info fs-2">${data.est_wait_time} min</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="progress mt-4" style="height: 20px;">
                                <div class="progress-bar bg-primary" role="progressbar" style="width: ${Math.max(10, 100 - (data.patients_ahead * 10))}%">
                                    ${data.patients_ahead} patients ahead
                                </div>
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    console.error('Error updating status:', error);
                });
        }

        updateStatus();
        setInterval(updateStatus, 10000); // Update every 10 seconds
    </script>
</body>
</html>
