<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Queue Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<div class="container py-5">
    <div class="text-center mb-4"><h1 class="display-5">NOW SERVING</h1><p class="text-muted">Live queue board</p></div>
    <div class="row gy-3">
        {% for row in board %}
        <div class="col-md-6">
            <div class="card bg-secondary text-white">
                <div class="card-body">
                    <h5>{{ row.doctor_name }} <small class="text-warning">({{ row.department }})</small></h5>
                    <p class="mb-1">Current: <span class="fw-bold text-info">{{ row.current_token }}</span></p>
                    <p class="mb-0">Next: {{ row.next_tokens|join(', ') or 'No more waiting' }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
