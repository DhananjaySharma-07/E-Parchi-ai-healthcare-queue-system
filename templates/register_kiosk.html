<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h3 class="card-title">Self-Service Kiosk</h3>
            <p class="text-muted">Register a patient quickly for walk-in queue.</p>
            <form method="post">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Full Name</label><input name="name" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Age</label><input type="number" name="age" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label">Gender</label><select name="gender" class="form-select"><option>Male</option><option>Female</option><option>Other</option></select></div>
                    <div class="col-md-12"><label class="form-label">Doctor</label><select name="doctor_id" class="form-select" required>{% for doc in doctors %}<option value="{{ doc.id }}">{{ doc.name }} ({{ doc.department.name }})</option>{% endfor %}</select></div>
                    <div class="col-md-12"><label class="form-label">Symptoms</label><textarea name="symptoms" class="form-control"></textarea></div>
                </div>
                <div class="mt-3"><button class="btn btn-primary">Generate Token</button></div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
