<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Assistant - E-Parchi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <style>
        .chat-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 8px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-bubble.user {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.ai {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .typing-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .suggestion-chip {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            background: #bbdefb;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/"><i class="fas fa-arrow-left me-2"></i> E-Parchi</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h5 class="mb-0"><i class="fas fa-brain me-2"></i> AI Health Assistant</h5>
                        <small class="text-white-50">Your intelligent healthcare guide</small>
                    </div>
                    <div class="card-body p-0">
                        <div class="chat-container" id="chat-container">
                            <!-- Chat messages will appear here -->
                        </div>
                        <div class="suggestion-chips px-3" id="suggestion-chips">
                            <div class="suggestion-chip" onclick="sendSuggestion('I have a toothache')">I have a toothache</div>
                            <div class="suggestion-chip" onclick="sendSuggestion('Which department for fever?')">Which department for fever?</div>
                            <div class="suggestion-chip" onclick="sendSuggestion('How does the queue system work?')">How does the queue system work?</div>
                            <div class="suggestion-chip" onclick="sendSuggestion('What doctors are available?')">What doctors are available?</div>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <div class="input-group">
                            <input type="text" class="form-control" id="user-input" placeholder="Describe your symptoms or ask a question..." onkeypress="handleKeyPress(event)">
                            <button class="btn btn-primary" onclick="sendMessage()" id="send-btn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                        <small class="text-muted mt-1 d-block">
                            <i class="fas fa-shield-alt me-1"></i>This assistant provides general guidance only. For medical emergencies, please contact emergency services.
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
