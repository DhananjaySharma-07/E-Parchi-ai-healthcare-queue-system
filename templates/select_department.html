<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Department - {{ hospital.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold" href="/">
                <i class="fas fa-arrow-left me-2"></i>Back
            </a>
            <span class="text-muted">{{ hospital.name }}</span>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <span class="badge bg-primary fs-6 me-2">Step 2</span>
                            <h5 class="mb-0 fw-bold">Choose Department</h5>
                        </div>
                        <p class="text-muted">Please pick the department for your consultation. Larger buttons for easier selection in busy hospital counters.</p>

                        <form method="POST">
                            <div class="row gy-3">
                                {% for dept in departments %}
                                <div class="col-12">
                                    <label class="d-block text-start p-3 border rounded-3 hover-card" style="cursor:pointer; background:#f9fbff;">
                                        <input class="form-check-input me-2" type="radio" name="department" value="{{ dept.id }}" required style="transform:scale(1.2);">
                                        <span class="fw-semibold">{{ dept.name }}</span>
                                        {% if dept.description %}
                                        <small class="d-block text-muted">{{ dept.description }}</small>
                                        {% endif %}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>

                            <div class="mt-4 d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-arrow-right me-2"></i>Continue
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mt-3 border-0 shadow-sm">
                    <div class="card-body p-3 text-center">
                        <small class="text-muted">Need help deciding? Ask the receptionist for department guidance.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
