<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h4 class="card-title">OTP Verification</h4>
            <p class="text-muted">Enter OTP sent to your phone to confirm your token {{ token.token_number if token else '' }}.</p>
            <form method="post">
                <div class="mb-3"><label class="form-label">OTP Code</label><input name="otp" class="form-control" required></div>
                <button class="btn btn-success">Verify OTP</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
