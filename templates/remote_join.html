<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Queue Join</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h3 class="card-title">Join Queue for {{ doctor.name }}</h3>
            <p class="text-muted">Department: {{ doctor.department.name }}</p>
            <form method="post">
                <div class="mb-3"><label class="form-label">Full Name</label><input name="name" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Phone</label><input name="phone" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Age</label><input name="age" type="number" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3"><label class="form-label">Symptoms</label><textarea name="symptoms" class="form-control"></textarea></div>
                <button class="btn btn-primary">Request Token (OTP required)</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
